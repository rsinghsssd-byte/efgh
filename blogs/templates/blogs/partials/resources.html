{% if blog.resources %}

<!-- ===================================== -->
<!-- Resources -->
<!-- ===================================== -->

<section
    id="resources"
    class="my-24">

    <!-- Header -->

    <div
        class="mb-12 flex items-center gap-6">

        <div
            class="flex h-20 w-20 items-center justify-center rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-600 shadow-xl">

            <i
                data-lucide="library-big"
                class="h-10 w-10 text-white">
            </i>

        </div>

        <div>

            <span
                class="inline-flex items-center gap-2 rounded-full bg-blue-100 dark:bg-blue-900/30 px-4 py-2 text-sm font-semibold text-blue-700 dark:text-blue-300">

                Useful Links

            </span>

            <h2
                class="mt-4 text-4xl md:text-5xl font-black tracking-tight text-slate-900 dark:text-white">

                Resources

            </h2>

        </div>

    </div>

    <!-- Resource Cards -->

    <div
        class="grid gap-8 md:grid-cols-2">

        {% for resource in blog.resources %}

        <article
            class="group overflow-hidden rounded-[2rem] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-lg transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl">

            <!-- Top Gradient -->

            <div
                class="h-2 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600">
            </div>

            <div
                class="p-8">

                <!-- Icon -->

                <div
                    class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 shadow-lg">

                    <i
                        data-lucide="book-open"
                        class="h-8 w-8 text-white">
                    </i>

                </div>

                <!-- Title -->

                <h3
                    class="mt-6 text-2xl font-bold text-slate-900 dark:text-white">

                    {{ resource.title }}

                </h3>

                <!-- Description -->

                {% if resource.description %}

                <p
                    class="mt-5 text-lg leading-8 text-slate-600 dark:text-slate-300">

                    {{ resource.description }}

                </p>

                {% endif %}

                <!-- Action -->

                {% if resource.url %}

                <div
                    class="mt-8">

                    <a
                        href="{{ resource.url }}"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="group/link inline-flex items-center gap-3 rounded-2xl bg-blue-600 px-6 py-4 font-semibold text-white shadow-lg transition-all duration-300 hover:bg-blue-700 hover:shadow-xl">

                        Visit Resource

                        <i
                            data-lucide="arrow-up-right"
                            class="h-5 w-5 transition-transform duration-300 group-hover/link:translate-x-1 group-hover/link:-translate-y-1">
                        </i>

                    </a>

                </div>

                {% endif %}

            </div>

        </article>

        {% endfor %}

    </div>

</section>

{% endif %}
