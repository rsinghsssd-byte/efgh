{% if blog.faq %}

<!-- ===================================== -->
<!-- FAQ -->
<!-- ===================================== -->

<section
    id="faq"
    class="my-24">

    <!-- Header -->

    <div
        class="mb-12 flex items-center gap-6">

        <div
            class="flex h-20 w-20 items-center justify-center rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-600 shadow-xl">

            <i
                data-lucide="circle-help"
                class="h-10 w-10 text-white">
            </i>

        </div>

        <div>

            <span
                class="inline-flex items-center gap-2 rounded-full bg-blue-100 dark:bg-blue-900/30 px-4 py-2 text-sm font-semibold text-blue-700 dark:text-blue-300">

                Questions & Answers

            </span>

            <h2
                class="mt-4 text-4xl md:text-5xl font-black tracking-tight text-slate-900 dark:text-white">

                Frequently Asked Questions

            </h2>

        </div>

    </div>

    <!-- FAQ Items -->

    <div class="space-y-6">

        {% for item in blog.faq %}

        <details
            class="group overflow-hidden rounded-[2rem] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-lg transition-all duration-300 hover:shadow-xl">

            <summary
                class="flex cursor-pointer list-none items-center justify-between px-8 py-7">

                <div class="flex items-center gap-5">

                    <div
                        class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow">

                        <i
                            data-lucide="help-circle"
                            class="h-6 w-6">
                        </i>

                    </div>

                    <h3
                        class="text-xl font-bold text-slate-900 dark:text-white">

                        {{ item.question }}

                    </h3>

                </div>

                <div
                    class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 transition-transform duration-300 group-open:rotate-45">

                    <i
                        data-lucide="plus"
                        class="h-5 w-5">
                    </i>

                </div>

            </summary>

            <div
                class="border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 px-8 py-7">

                <p
                    class="text-lg leading-9 text-slate-700 dark:text-slate-300">

                    {{ item.answer }}

                </p>

            </div>

        </details>

        {% endfor %}

    </div>

</section>

{% endif %}
