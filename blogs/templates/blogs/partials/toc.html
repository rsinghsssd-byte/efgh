<!-- =============================== -->
<!-- Blog Information -->
<!-- =============================== -->

<aside class="hidden xl:block xl:col-span-2">

    <div class="sticky top-24">

        <div
            class="overflow-hidden rounded-[2rem] border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-xl">

            <!-- Header -->

            <div
                class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white">

                <div
                    class="flex items-center gap-3">

                    <div
                        class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/20">

                        <i
                            data-lucide="book-open"
                            class="w-6 h-6">
                        </i>

                    </div>

                    <div>

                        <h3 class="text-lg font-bold">

                            Blog Information

                        </h3>

                        <p class="text-blue-100 text-sm">

                            Article Overview

                        </p>

                    </div>

                </div>

            </div>

            <!-- Content -->

            <div class="p-6 space-y-6">

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Category

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ blog.category }}

                    </p>

                </div>

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Chapters

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ chapters|length }}

                    </p>

                </div>

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Audience

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ blog.target_audience }}

                    </p>

                </div>

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Tone

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ blog.tone }}

                    </p>

                </div>

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Language

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ blog.language }}

                    </p>

                </div>

                <div>

                    <p class="text-xs uppercase tracking-wider text-slate-400">

                        Created

                    </p>

                    <p class="mt-2 font-semibold">

                        {{ blog.created_at|date:"d M Y" }}

                    </p>

                </div>

            </div>

        </div>

    </div>

</aside>
