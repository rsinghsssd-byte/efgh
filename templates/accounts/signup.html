<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | Luminous AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e2dfff",
                        "on-background": "#191c1d",
                        "on-surface-variant": "#464555",
                        "error": "#ba1a1a",
                        "secondary": "#712ae2",
                        "tertiary": "#00505f",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#006a7c",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "primary-container": "#4f46e5",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#fffbff",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary-fixed": "#001f26",
                        "on-secondary-fixed": "#25005a",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#777587",
                        "on-primary-container": "#dad7ff",
                        "primary": "#3525cd",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-fixed": "#acedff",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-container": "#93e8ff",
                        "surface-tint": "#4d44e3",
                        "secondary-fixed-dim": "#d2bbff",
                        "on-primary-fixed": "#000069",
                        "outline-variant": "#c7c4d8",
                        "inverse-on-surface": "#f0f1f2",
                        "surface": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "secondary-fixed": "#eaddff",
                        "surface-bright": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "secondary-container": "#8a4cfc",
                        "primary-fixed-dim": "#c3c0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "4rem",
                        "sm": "1rem",
                        "md": "1.5rem",
                        "base": "4px",
                        "xs": "0.5rem",
                        "gutter": "24px",
                        "lg": "2.5rem",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .mesh-bg {
            background-color: #f8f9fa;
            background-image:
                radial-gradient(at 0% 0%, hsla(242, 78%, 95%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(262, 70%, 93%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(190, 70%, 93%, 1) 0, transparent 50%);
        }

        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>

<body class="mesh-bg min-h-screen flex flex-col items-center justify-center p-md md:p-xl">
    <!-- Navigation Shell Suppressed as per Task (Transactional/Linear Flow) -->
    <main class="w-full max-w-[520px] mx-auto animate-in fade-in duration-700">
        <!-- Logo / Brand Anchor -->
        <div class="flex flex-col items-center mb-lg">
            <span class="font-display text-headline-md font-bold text-primary tracking-tight mb-xs">Luminous AI</span>
            <p class="font-body-md text-on-surface-variant text-center px-md">Unleash your creativity with premium AI
                blog generation.</p>
        </div>
        <!-- Centered Signup Card -->
        <div class="glass-card rounded-[16px] p-md md:p-lg overflow-hidden">
            <div class="mb-lg">
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Create Account</h1>
                <p class="font-label-md text-on-surface-variant">Sign up to start your 7-day free trial.</p>
            </div>
            <!-- Social Auth Buttons -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-sm mb-lg">
                <button
                    class="flex items-center justify-center gap-xs bg-surface-container-lowest border border-outline-variant rounded-xl py-sm font-label-md text-on-surface hover:bg-surface-container-low transition-all active:scale-[0.98]">
                    <img alt="Google" class="w-5 h-5"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpxsWriLKyQFUSz2Z0jgI0h87bEvvMVmVTnJTynslpVPv6TQL1bbd4m9KVTb8Mo-IoY3xbHdnCOEwWqXtHMdQme8clpYcjiUyFkvxJoKWwq0W17A56xA1HLriEjfFw_z66jRPvwpApICVFHjjxULeL1moyK3rvfK6hVTKaYFlD-AFz2FS4itweL6hV4HxIXskoHqp-iVmLBkPoinpetilE2HDnB3fma3cSKuV-bQKt5wWQsU2OYOAjDQ" />
                    Continue with Google
                </button>
                <button
                    class="flex items-center justify-center gap-xs bg-surface-container-lowest border border-outline-variant rounded-xl py-sm font-label-md text-on-surface hover:bg-surface-container-low transition-all active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                        <path
                            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12">
                        </path>
                    </svg>
                    Continue with GitHub
                </button>
            </div>
            <div class="relative flex items-center justify-center mb-lg">
                <div class="w-full border-t border-outline-variant"></div>
                <span class="absolute bg-surface-container-lowest px-sm font-label-sm text-outline uppercase">Or with
                    Email</span>
            </div>
            <!-- Signup Form -->
            <form class="space-y-md" onsubmit="event.preventDefault();">
                <!-- Full Name -->
                <div class="space-y-xs">
                    <label class="font-label-md text-on-surface" for="full_name">Full Name</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
                        <input
                            class="w-full bg-[#F9FAFB] border border-outline-variant rounded-xl py-sm pl-[44px] pr-sm font-body-md text-on-surface placeholder:text-outline outline-none transition-all focus:border-primary-container input-glow"
                            id="full_name" placeholder="John Doe" type="text" />
                    </div>
                </div>
                <!-- Email Address -->
                <div class="space-y-xs">
                    <label class="font-label-md text-on-surface" for="email">Email Address</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
                        <input
                            class="w-full bg-[#F9FAFB] border border-outline-variant rounded-xl py-sm pl-[44px] pr-sm font-body-md text-on-surface placeholder:text-outline outline-none transition-all focus:border-primary-container input-glow"
                            id="email" placeholder="name@company.com" type="email" />
                    </div>
                </div>
                <!-- Password -->
                <div class="space-y-xs">
                    <label class="font-label-md text-on-surface" for="password">Password</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
                        <input
                            class="w-full bg-[#F9FAFB] border border-outline-variant rounded-xl py-sm pl-[44px] pr-[44px] font-body-md text-on-surface placeholder:text-outline outline-none transition-all focus:border-primary-container input-glow"
                            id="password" placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
                            onclick="togglePassword('password', this)" type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Confirm Password -->
                <div class="space-y-xs">
                    <label class="font-label-md text-on-surface" for="confirm_password">Confirm Password</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px]">lock_reset</span>
                        <input
                            class="w-full bg-[#F9FAFB] border border-outline-variant rounded-xl py-sm pl-[44px] pr-[44px] font-body-md text-on-surface placeholder:text-outline outline-none transition-all focus:border-primary-container input-glow"
                            id="confirm_password" placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors"
                            onclick="togglePassword('confirm_password', this)" type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Checkbox -->
                <div class="flex items-start gap-sm py-xs">
                    <div class="relative flex items-center pt-0.5">
                        <input
                            class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/20 cursor-pointer"
                            id="terms" type="checkbox" />
                    </div>
                    <label class="font-label-md text-on-surface-variant cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a
                            class="text-primary hover:underline" href="#">Privacy Policy</a>
                    </label>
                </div>
                <!-- Primary Action -->
                <button
                    class="w-full bg-primary-container text-on-primary font-label-md py-md rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 mt-sm">
                    Create Account
                </button>
            </form>
        </div>
        <!-- Footer Text -->
        <div class="mt-lg text-center">
            <p class="font-body-md text-on-surface-variant">
                Already have an account?
                <a class="text-primary font-semibold hover:underline transition-all" href="#">Login</a>
            </p>
        </div>
    </main>
    <!-- Simple Atmospheric Footer (as per JSON Footer but minimal for signup) -->
    <footer class="mt-xl w-full max-w-container-max mx-auto px-lg py-md text-center">
        <p class="font-label-sm text-outline">© 2024 Luminous AI. All rights reserved.</p>
        <div class="flex justify-center gap-md mt-sm">
            <a class="font-label-sm text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="font-label-sm text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="font-label-sm text-outline hover:text-primary transition-colors" href="#">Cookie Policy</a>
        </div>
    </footer>
    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        // Simple entrance animation logic
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            setTimeout(() => {
                main.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>

</html>
