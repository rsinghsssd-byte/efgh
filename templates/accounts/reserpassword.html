<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password | AI Blog Generator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "on-primary-container": "#dad7ff",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary-container": "#006a7c",
                        "on-secondary-fixed": "#25005a",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "on-background": "#191c1d",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-surface-variant": "#464555",
                        "error": "#ba1a1a",
                        "secondary-container": "#8a4cfc",
                        "inverse-primary": "#c3c0ff",
                        "surface-tint": "#4d44e3",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-container": "#fffbff",
                        "on-primary-fixed": "#0f0069",
                        "tertiary": "#00505f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#93e8ff",
                        "primary-container": "#4f46e5",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "tertiary-fixed": "#acedff",
                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#d2bbff",
                        "primary-fixed-dim": "#c3c0ff",
                        "outline": "#777587",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container": "#edeeef",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#eaddff",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "inverse-surface": "#2e3132",
                        "primary": "#3525cd",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8e9",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#001f26",
                        "surface-container-low": "#f3f4f5",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "secondary": "#712ae2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "1.5rem",
                        "xl": "4rem",
                        "lg": "2.5rem",
                        "base": "4px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "xs": "0.5rem",
                        "sm": "1rem"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0px 20px 25px -5px rgba(0, 0, 0, 0.05), 0px 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .mesh-gradient {
            background-color: #f8f9fa;
            background-image:
                radial-gradient(at 0% 0%, hsla(243, 75%, 90%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(265, 83%, 92%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(243, 75%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(265, 83%, 95%, 1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .accent-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #712ae2 100%);
        }
    </style>
</head>

<body class="mesh-gradient min-h-screen flex flex-col justify-center items-center px-gutter">
    <!-- Success Message Container (Hidden by default) -->
    <div class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[100] w-full max-w-md animate-in fade-in slide-in-from-top-4 duration-500"
        id="success-alert">
        <div
            class="bg-primary-fixed text-on-primary-fixed-variant px-md py-sm rounded-xl flex items-center gap-sm shadow-lg border border-primary/10">
            <span class="material-symbols-outlined text-primary">check_circle</span>
            <p class="font-label-md text-label-md">Check your email. We've sent a password reset link to your inbox.</p>
            <button class="ml-auto opacity-70 hover:opacity-100"
                onclick="document.getElementById('success-alert').classList.add('hidden')">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </div>
    <!-- Main Content Canvas -->
    <main class="w-full max-w-[440px] relative">
        <!-- Logo Header -->
        <div class="text-center mb-lg">
            <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-xl accent-gradient text-white mb-md shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Reset your password</h1>
            <p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto leading-relaxed">
                Enter your email address and we'll send you a link to reset your password.
            </p>
        </div>
        <!-- Glassmorphism Card -->
        <div class="glass-card rounded-[16px] p-lg">
            <form class="space-y-md" id="reset-form">
                <!-- Email Input -->
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email
                        Address</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
                        <input
                            class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-transparent focus:border-primary focus:ring-4 focus:ring-primary/5 rounded-[12px] font-body-md text-body-md transition-all duration-200 placeholder:text-outline-variant"
                            id="email" name="email" placeholder="name@company.com" required="" type="email" />
                    </div>
                </div>
                <!-- Action Button -->
                <button
                    class="w-full accent-gradient text-white font-label-md text-label-md py-4 rounded-xl shadow-md hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-xs group"
                    type="submit">
                    <span>Send Reset Link</span>
                    <span
                        class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>
            <!-- Navigation Links -->
            <div class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
                <a class="inline-flex items-center gap-xs font-label-md text-label-md text-primary hover:text-secondary transition-colors group"
                    href="#">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    <span>Back to Login</span>
                </a>
            </div>
        </div>
        <!-- Atmospheric Accents -->
        <div
            class="absolute -top-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[80px] pointer-events-none -z-10">
        </div>
        <div
            class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary/10 rounded-full blur-[80px] pointer-events-none -z-10">
        </div>
    </main>
    <!-- Footer Identity (Simplified for Reset Screen) -->
    <footer class="mt-xl text-center">
        <p class="font-label-sm text-label-sm text-outline-variant">
            © 2024 AI Blog Generator. All rights reserved.
        </p>
    </footer>
    <script>
        document.getElementById('reset-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const submitBtn = this.querySelector('button[type="submit"]');
            const alert = document.getElementById('success-alert');

            // Loading State Mockup
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span><span>Sending...</span>`;

            setTimeout(() => {
                // Restore button and show alert
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Send Reset Link</span><span class="material-symbols-outlined text-[20px]">arrow_forward</span>`;

                alert.classList.remove('hidden');

                // Hide alert after 5 seconds
                setTimeout(() => {
                    alert.classList.add('hidden');
                }, 5000);
            }, 1200);
        });

        // Interactive focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.previousElementSibling.classList.add('text-primary');
                input.previousElementSibling.classList.remove('text-outline');
            });
            input.addEventListener('blur', () => {
                input.previousElementSibling.classList.remove('text-primary');
                input.previousElementSibling.classList.add('text-outline');
            });
        });
    </script>
</body>

</html>
