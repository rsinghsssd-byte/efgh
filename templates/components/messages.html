{% if messages %}

<div
    id="toastContainer"
    class="fixed top-5 right-5 z-[9999] flex flex-col gap-3
    w-[calc(100%-2rem)] max-w-sm
    sm:w-96">

    {% for message in messages %}

    <div
        class="toast relative overflow-hidden rounded-2xl border
        shadow-xl backdrop-blur-xl
        animate-[fadeIn_.35s_ease]
        px-5 py-4 pr-12

        {% if message.tags == 'success' %}
        bg-emerald-500/95 border-emerald-400 text-white
        {% elif message.tags == 'error' %}
        bg-red-500/95 border-red-400 text-white
        {% elif message.tags == 'warning' %}
        bg-amber-500/95 border-amber-400 text-white
        {% else %}
        bg-blue-600/95 border-blue-500 text-white
        {% endif %}
        ">

        <button
            class="toast-close absolute top-3 right-3 opacity-80 hover:opacity-100">

            <i
                data-lucide="x"
                class="w-4 h-4">
            </i>

        </button>

        <div class="flex gap-3 items-start">

            {% if message.tags == "success" %}
                <i data-lucide="badge-check" class="w-5 h-5 mt-0.5"></i>

            {% elif message.tags == "error" %}
                <i data-lucide="circle-x" class="w-5 h-5 mt-0.5"></i>

            {% elif message.tags == "warning" %}
                <i data-lucide="triangle-alert" class="w-5 h-5 mt-0.5"></i>

            {% else %}
                <i data-lucide="info" class="w-5 h-5 mt-0.5"></i>

            {% endif %}

            <div class="leading-relaxed">

                {{ message }}

            </div>

        </div>

        <div
            class="absolute bottom-0 left-0 h-1 bg-white/30 toast-progress">
        </div>

    </div>

    {% endfor %}

</div>

<style>

@keyframes fadeIn{

from{
opacity:0;
transform:translateX(30px);
}

to{
opacity:1;
transform:translateX(0);
}

}

@keyframes fadeOut{

to{
opacity:0;
transform:translateX(40px);
}

}

.toast-hide{

animation:fadeOut .3s forwards;

}

.toast-progress{

animation:progress 5s linear forwards;

}

@keyframes progress{

from{
width:100%;
}

to{
width:0%;
}

}

</style>

<script>

document.addEventListener("DOMContentLoaded",()=>{

lucide.createIcons();

document.querySelectorAll(".toast").forEach((toast)=>{

const removeToast=()=>{

toast.classList.add("toast-hide");

setTimeout(()=>toast.remove(),300);

};

setTimeout(removeToast,5000);

toast.querySelector(".toast-close")
.addEventListener("click",removeToast);

});

});

</script>

{% endif %}
