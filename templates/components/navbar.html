<header
    class="sticky top-0 z-40
    bg-white/80 dark:bg-slate-900/80
    backdrop-blur-xl
    border-b border-slate-200/70 dark:border-slate-800/70">

    <div class="flex items-center justify-between h-20 px-6 lg:px-8">

        <!-- Left -->
        <div class="flex items-center gap-4">

            <button
                id="sidebarToggle"
                class="lg:hidden flex items-center justify-center w-11 h-11 rounded-xl
                hover:bg-slate-100 dark:hover:bg-slate-800
                transition-all duration-200 hover:scale-105">

                <i
                    data-lucide="menu"
                    class="w-5 h-5">
                </i>

            </button>

            <div class="hidden md:block">

                <h2 class="text-xl font-bold tracking-tight">

                    {% block page_title %}
                    Dashboard
                    {% endblock %}

                </h2>

                <p class="text-sm text-slate-500 dark:text-slate-400">

                    Welcome back 👋

                </p>

            </div>

        </div>

        <!-- Right -->
        <div class="flex items-center gap-3">

            <!-- Theme -->
            <button
                id="themeToggle"
                class="flex items-center justify-center
                w-11 h-11
                rounded-xl
                border border-slate-200 dark:border-slate-700
                bg-white dark:bg-slate-900
                hover:bg-slate-100 dark:hover:bg-slate-800
                hover:scale-105
                transition-all duration-200">

                <i
                    id="themeIcon"
                    data-lucide="moon"
                    class="w-5 h-5">
                </i>

            </button>

            <!-- Notifications -->
            <button
                class="relative flex items-center justify-center
                w-11 h-11
                rounded-xl
                border border-slate-200 dark:border-slate-700
                bg-white dark:bg-slate-900
                hover:bg-slate-100 dark:hover:bg-slate-800
                hover:scale-105
                transition-all duration-200">

                <i
                    data-lucide="bell"
                    class="w-5 h-5">
                </i>

                <span
                    class="absolute top-2 right-2
                    w-2.5 h-2.5
                    rounded-full
                    bg-red-500
                    ring-2 ring-white dark:ring-slate-900">
                </span>

            </button>

            <!-- Divider -->
            <div class="hidden md:block w-px h-8 bg-slate-200 dark:bg-slate-700"></div>

        </div>

    </div>

<script>

const themeButton = document.getElementById("themeToggle");

function updateThemeIcon(){

    const dark=document.documentElement.classList.contains("dark");

    themeButton.innerHTML=dark
    ?'<i id="themeIcon" data-lucide="sun" class="w-5 h-5"></i>'
    :'<i id="themeIcon" data-lucide="moon" class="w-5 h-5"></i>';

    lucide.createIcons();

}

themeButton.addEventListener("click",()=>{

    document.documentElement.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.documentElement.classList.contains("dark")
        ?"dark"
        :"light"
    );

    updateThemeIcon();

});

updateThemeIcon();

</script>

</header>
