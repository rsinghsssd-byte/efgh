<div
class="
bg-white
dark:bg-slate-900

rounded-2xl

border
border-slate-200
dark:border-slate-800

shadow-sm

p-6

hover:shadow-lg

transition-all
duration-300
">

    <div class="flex items-center justify-between">

        <div>

            <p
            class="text-sm text-slate-500">

                {{ title }}

            </p>

            <h2
            class="text-4xl font-bold mt-3">

                {{ value }}

            </h2>

            {% if subtitle %}

            <p
            class="mt-3 text-sm text-slate-500">

                {{ subtitle }}

            </p>

            {% endif %}

        </div>

        {% if icon %}

        <div
        class="
        w-14
        h-14

        rounded-2xl

        bg-blue-100
        dark:bg-slate-800

        flex
        items-center
        justify-center
        ">

            <i
            data-lucide="{{ icon }}"
            class="w-7 h-7 text-blue-600">

            </i>

        </div>

        {% endif %}

    </div>

</div>
