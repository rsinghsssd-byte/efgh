{% extends "authentication/base_auth.html" %}

{% block title %}
Reset Password | AI Blog Generator
{% endblock %}

{% block auth_content %}

<div>

    <div class="text-center mb-8">

        <h1 class="text-4xl font-bold text-slate-900">

            Reset Password

        </h1>

        <p class="mt-3 text-slate-500">

            Enter your new password below.

        </p>

    </div>

    <!-- Success -->

    <div
        id="successBox"
        class="hidden mb-6 rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-green-700">
    </div>

    <!-- Error -->

    <div
        id="errorBox"
        class="hidden mb-6 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">
    </div>

    <form
        id="resetForm"
        class="space-y-6">

        <div>

            <label class="block mb-2 font-medium">

                New Password

            </label>

            <input

                id="password"

                type="password"

                required

                class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:ring-2 focus:ring-blue-600 focus:outline-none">

        </div>

        <div>

            <label class="block mb-2 font-medium">

                Confirm Password

            </label>

            <input

                id="confirmPassword"

                type="password"

                required

                class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:ring-2 focus:ring-blue-600 focus:outline-none">

        </div>

        <button

            id="resetButton"

            class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-3 font-semibold">

            Update Password

        </button>

    </form>

</div>

{% endblock %}

{% block scripts %}

<script>

const form = document.getElementById("resetForm");

const password = document.getElementById("password");

const confirmPassword = document.getElementById("confirmPassword");

const successBox = document.getElementById("successBox");

const errorBox = document.getElementById("errorBox");

const button = document.getElementById("resetButton");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    successBox.classList.add("hidden");

    errorBox.classList.add("hidden");

    if (password.value !== confirmPassword.value) {

        errorBox.innerText = "Passwords do not match.";

        errorBox.classList.remove("hidden");

        return;

    }

    button.disabled = true;

    button.innerHTML = "Updating...";

    try {

        await Auth.updatePassword(password.value);

        successBox.innerHTML = `
            Password updated successfully.<br><br>
            <a href="${window.LOGIN_URL}" class="text-blue-600 font-semibold underline">
                Continue to Login
            </a>
        `;

        successBox.classList.remove("hidden");

        form.style.display = "none";

    }

    catch (error) {

        errorBox.innerText = error.message;

        errorBox.classList.remove("hidden");

        button.disabled = false;

        button.innerHTML = "Update Password";

    }

});

</script>

{% endblock %}
