{% extends "authentication/base_auth.html" %}

{% block title %}
Signing In...
{% endblock %}

{% block auth_content %}

<div class="text-center">

    <div class="mx-auto w-20 h-20 rounded-3xl bg-blue-600 flex items-center justify-center text-white text-3xl font-bold">

        AI

    </div>

    <h1 class="mt-8 text-3xl font-bold">

        Completing Sign In...

    </h1>

    <p class="mt-3 text-slate-500">

        Please wait while we securely sign you in.

    </p>

    <div class="mt-10 flex justify-center">

        <div
            class="w-12 h-12 rounded-full border-4 border-blue-600 border-t-transparent animate-spin">
        </div>

    </div>

    <div
        id="errorBox"
        class="hidden mt-8 rounded-xl border border-red-200 bg-red-50 p-4 text-red-700">
    </div>

</div>

{% endblock %}

{% block scripts %}

<script>

(async () => {

    try {

        console.log("OAuth Callback Started");

        const {

            data,

            error,

        } = await window.supabaseClient.auth.getSession();

        console.log(data);

        if (error) {

            throw error;

        }

        if (!data.session) {

            throw new Error("Supabase session not found.");

        }

        await Auth.createDjangoSession(

            data.session.access_token

        );

        window.location.href =

            window.DASHBOARD_URL;

    }

    catch (error) {

        console.error(error);

        const box =

            document.getElementById("errorBox");

        box.innerText =

            error.message;

        box.classList.remove("hidden");

    }

})();

</script>

{% endblock %}
