<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI BlogGen | Generating Magic...</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .shimmer-wrapper {
            position: relative;
            overflow: hidden;
            background-color: #edeeef;
            /* surface-container */
        }

        .shimmer-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.4),
                    transparent);
            animation: shimmer 1.5s infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#464555",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#dad7ff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#006a7c",
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-high": "#e7e8e9",
                        "primary-fixed": "#e2dfff",
                        "outline-variant": "#c7c4d8",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "secondary-fixed-dim": "#d2bbff",
                        "inverse-primary": "#c3c0ff",
                        "tertiary-fixed": "#acedff",
                        "tertiary": "#00505f",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "surface-bright": "#f8f9fa",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-fixed": "#eaddff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fa",
                        "primary": "#3525cd",
                        "surface-container-highest": "#e1e3e4",
                        "primary-container": "#4f46e5",
                        "secondary-container": "#8a4cfc",
                        "error-container": "#ffdad6",
                        "background": "#f8f9fa",
                        "on-primary-fixed": "#0f0069",
                        "on-background": "#191c1d",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "surface-container-low": "#f3f4f5",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-secondary-fixed": "#25005a",
                        "outline": "#777587",
                        "on-secondary-container": "#fffbff",
                        "on-tertiary-fixed": "#001f26",
                        "on-primary-fixed-variant": "#3323cc",
                        "secondary": "#712ae2",
                        "on-tertiary-container": "#93e8ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#4d44e3",
                        "inverse-surface": "#2e3132"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "4rem",
                        "lg": "2.5rem",
                        "xs": "0.5rem",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "base": "4px",
                        "sm": "1rem",
                        "md": "1.5rem"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden">
    <!-- Sidebar Shell -->
    <aside
        class="fixed left-0 top-0 h-full w-64 bg-surface dark:bg-inverse-surface shadow-sm flex flex-col p-md overflow-y-auto z-50">
        <div class="mb-lg">
            <h1 class="font-headline-md text-headline-md font-bold text-primary mb-1">AI BlogGen</h1>
            <p class="font-label-md text-label-md text-on-surface-variant">Premium SaaS</p>
        </div>
        <nav class="flex-grow space-y-1">
            <!-- Active State Navigation -->
            <a class="flex items-center gap-3 p-3 rounded-lg text-primary font-bold border-r-2 border-primary bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
                <span>Generator</span>
            </a>
            <a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="article">article</span>
                <span>My Blogs</span>
            </a>
            <a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="insights">insights</span>
                <span>Analytics</span>
            </a>
        </nav>
        <div class="mt-auto space-y-1 pt-md border-t border-outline-variant/30">
            <a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
                <span>Settings</span>
            </a>
            <a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-colors"
                href="#">
                <span class="material-symbols-outlined" data-icon="help">help</span>
                <span>Support</span>
            </a>
            <button
                class="w-full mt-4 bg-primary text-on-primary py-3 px-4 rounded-xl font-label-md text-label-md hover:scale-102 transition-transform shadow-md">
                Upgrade to Pro
            </button>
        </div>
    </aside>
    <!-- Top Navigation -->
    <header
        class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 flex justify-between items-center px-lg bg-surface/60 backdrop-blur-md border-b border-outline-variant/30 z-40">
        <div class="flex items-center gap-4">
            <div class="relative w-64">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline"
                    data-icon="search">search</span>
                <div class="shimmer-wrapper shimmer-effect h-10 w-full rounded-xl"></div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="material-symbols-outlined text-on-surface-variant"
                data-icon="notifications">notifications</button>
            <button class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</button>
            <div class="h-10 w-10 rounded-full bg-surface-container-high overflow-hidden">
                <img class="w-full h-full object-cover"
                    data-alt="A clean, professional headshot of a user against a minimalist soft gray background. The lighting is bright and airy, typical of high-end corporate portraiture. The style is modern and minimalist, aligning with a premium SaaS aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9-ZIwpDaOGt6tI45hpPL3GpLYL-JIouwcTPlLrhZR3PQYKHBRYtOQFzq8iIXZgR5r403mRMWF5X3mbNTBLZKV7195O-R_qqn9DYlF7k6iVhnikHiL48vA2SO9VV_y0x2CIEZXEysfNrm1x3C35fUN0lJ_M65ZPSDLMnWtIyWA7SVxA1iyTI9Ap5nXu8nH5HTfB2fpIi8mHhDeZVbd27o49IekLttPh4vdt_8_yvXP31ymNZCTtEP2ug" />
            </div>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="ml-64 mt-16 p-lg h-[calc(100vh-4rem)] bg-background">
        <div class="max-w-container-max mx-auto h-full flex gap-gutter">
            <!-- Left Panel: Configuration Form Skeleton -->
            <section class="w-1/3 flex flex-col gap-sm overflow-y-auto pr-2">
                <div class="flex flex-col gap-xs mb-md">
                    <div class="shimmer-wrapper shimmer-effect h-8 w-3/4 rounded-lg"></div>
                    <div class="shimmer-wrapper shimmer-effect h-4 w-1/2 rounded-lg opacity-60"></div>
                </div>
                <!-- Topic Field -->
                <div
                    class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.05)] space-y-3">
                    <div class="shimmer-wrapper shimmer-effect h-4 w-1/4 rounded-md"></div>
                    <div class="shimmer-wrapper shimmer-effect h-12 w-full rounded-xl"></div>
                </div>
                <!-- Keywords Field -->
                <div
                    class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.05)] space-y-3">
                    <div class="shimmer-wrapper shimmer-effect h-4 w-1/3 rounded-md"></div>
                    <div class="shimmer-wrapper shimmer-effect h-20 w-full rounded-xl"></div>
                </div>
                <!-- Audience Selection -->
                <div
                    class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.05)] space-y-3">
                    <div class="shimmer-wrapper shimmer-effect h-4 w-1/4 rounded-md"></div>
                    <div class="grid grid-cols-2 gap-xs">
                        <div class="shimmer-wrapper shimmer-effect h-10 w-full rounded-xl"></div>
                        <div class="shimmer-wrapper shimmer-effect h-10 w-full rounded-xl"></div>
                        <div class="shimmer-wrapper shimmer-effect h-10 w-full rounded-xl"></div>
                        <div class="shimmer-wrapper shimmer-effect h-10 w-full rounded-xl"></div>
                    </div>
                </div>
                <!-- Tone of Voice -->
                <div
                    class="bg-surface-container-lowest p-md rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.05)] space-y-3">
                    <div class="shimmer-wrapper shimmer-effect h-4 w-1/3 rounded-md"></div>
                    <div class="shimmer-wrapper shimmer-effect h-12 w-full rounded-xl"></div>
                </div>
                <!-- Action Button Skeleton -->
                <div class="shimmer-wrapper shimmer-effect h-14 w-full rounded-xl mt-4"></div>
            </section>
            <!-- Right Panel: Live Preview Area Skeleton -->
            <section
                class="flex-1 bg-surface-container-lowest rounded-xl shadow-[0px_1px_3px_rgba(0,0,0,0.05)] overflow-hidden flex flex-col">
                <!-- Preview Header -->
                <div
                    class="px-md py-sm border-b border-outline-variant/30 flex justify-between items-center glass-panel">
                    <div class="flex items-center gap-2">
                        <div class="shimmer-wrapper shimmer-effect h-6 w-32 rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-5 w-16 rounded-full opacity-50"></div>
                    </div>
                    <div class="flex gap-2">
                        <div class="shimmer-wrapper shimmer-effect h-8 w-8 rounded-lg"></div>
                        <div class="shimmer-wrapper shimmer-effect h-8 w-24 rounded-lg"></div>
                    </div>
                </div>
                <!-- Preview Content Shimmer -->
                <div class="p-xl flex-grow overflow-y-auto">
                    <!-- Title Skeleton -->
                    <div class="shimmer-wrapper shimmer-effect h-12 w-4/5 rounded-lg mb-lg mx-auto"></div>
                    <!-- Content Block 1 (Hero-ish) -->
                    <div class="shimmer-wrapper shimmer-effect h-64 w-full rounded-xl mb-lg"></div>
                    <!-- Text Skeleton Blocks -->
                    <div class="space-y-4 max-w-3xl mx-auto">
                        <div class="shimmer-wrapper shimmer-effect h-4 w-full rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-full rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-5/6 rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-1/2 rounded-md"></div>
                    </div>
                    <div class="my-xl space-y-4 max-w-3xl mx-auto">
                        <div class="shimmer-wrapper shimmer-effect h-8 w-1/3 rounded-md mb-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-full rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-full rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-4/5 rounded-md"></div>
                    </div>
                    <div class="space-y-4 max-w-3xl mx-auto">
                        <div class="shimmer-wrapper shimmer-effect h-4 w-full rounded-md"></div>
                        <div class="shimmer-wrapper shimmer-effect h-4 w-5/6 rounded-md"></div>
                    </div>
                </div>
                <!-- Sticky Generation Indicator -->
                <div
                    class="px-md py-4 glass-panel border-t border-outline-variant/30 flex items-center justify-center gap-3">
                    <div class="animate-spin h-5 w-5 border-2 border-primary border-t-transparent rounded-full"></div>
                    <span class="text-label-md font-label-md text-primary tracking-wide">AI is refining your
                        content...</span>
                </div>
            </section>
        </div>
    </main>
    <!-- Interactive micro-interactions for the "Pro" button -->
    <script>
        document.querySelector('button.bg-primary').addEventListener('mouseenter', function () {
            this.style.filter = 'brightness(1.1)';
        });
        document.querySelector('button.bg-primary').addEventListener('mouseleave', function () {
            this.style.filter = 'none';
        });
    </script>
</body>

</html>
