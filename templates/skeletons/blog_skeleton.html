<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e2dfff",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "outline-variant": "#c7c4d8",
                        "primary-container": "#4f46e5",
                        "primary-fixed-dim": "#c3c0ff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container": "#edeeef",
                        "surface-container-highest": "#e1e3e4",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed": "#0f0069",
                        "on-surface": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed": "#001f26",
                        "tertiary-container": "#006a7c",
                        "inverse-primary": "#c3c0ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "on-primary": "#ffffff",
                        "primary": "#3525cd",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#fffbff",
                        "secondary-fixed": "#eaddff",
                        "secondary": "#712ae2",
                        "on-secondary-fixed": "#25005a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#d2bbff",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-background": "#191c1d",
                        "surface-tint": "#4d44e3",
                        "on-primary-container": "#dad7ff",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed": "#acedff",
                        "secondary-container": "#8a4cfc",
                        "tertiary": "#00505f",
                        "surface": "#f8f9fa",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "outline": "#777587",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#464555",
                        "on-tertiary-container": "#93e8ff",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed-variant": "#3323cc",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "surface-container-low": "#f3f4f5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "1.5rem",
                        "gutter": "24px",
                        "xl": "4rem",
                        "sm": "1rem",
                        "base": "4px",
                        "container-max": "1280px",
                        "lg": "2.5rem",
                        "xs": "0.5rem"
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, #edeeef 25%, #f3f4f5 50%, #edeeef 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background font-['Inter']">
    <div class="relative flex h-auto min-h-screen w-full flex-col bg-background group/design-root overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <div class="px-4 md:px-40 flex flex-1 justify-center py-5">
                <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
                    <!-- Shared Header Mockup (Read-Only Logic) -->
                    <header
                        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-outline-variant px-10 py-3">
                        <div class="flex items-center gap-4 text-on-surface">
                            <div class="size-4 text-primary">
                                <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                    <path clip-rule="evenodd"
                                        d="M24 4H6V17.3333V30.6667H24V44H42V30.6667V17.3333H24V44Z" fill="currentColor"
                                        fill-rule="evenodd"></path>
                                </svg>
                            </div>
                            <h2 class="text-on-surface text-lg font-bold leading-tight tracking-[-0.015em]">My Blogs
                            </h2>
                        </div>
                        <div class="flex flex-1 justify-end gap-8">
                            <div class="flex flex-col min-w-40 !h-10 max-w-64 opacity-50">
                                <div class="flex w-full flex-1 items-stretch rounded-lg h-full bg-surface-container">
                                    <div class="text-outline flex items-center justify-center pl-4 rounded-l-lg"
                                        data-icon="MagnifyingGlass">
                                        <span class="material-symbols-outlined">search</span>
                                    </div>
                                    <div class="flex-1 px-4 py-2"></div>
                                </div>
                            </div>
                            <button
                                class="flex max-w-[480px] items-center justify-center overflow-hidden rounded-lg h-10 bg-surface-container text-on-surface px-2.5 opacity-50">
                                <span class="material-symbols-outlined">add</span>
                            </button>
                            <div class="bg-surface-container-highest rounded-full size-10 shimmer"></div>
                        </div>
                    </header>
                    <!-- Sidebar + Title Section -->
                    <div class="flex h-full flex-col justify-between bg-background p-4">
                        <div class="flex flex-col gap-4">
                            <div class="flex gap-3">
                                <div class="rounded-full size-10 shimmer"></div>
                                <div class="flex flex-col gap-2">
                                    <div class="h-4 w-24 shimmer rounded"></div>
                                    <div class="h-3 w-32 shimmer rounded"></div>
                                </div>
                            </div>
                            <!-- Navigation Skeletons -->
                            <div class="flex flex-col gap-2 mt-4">
                                <div class="flex items-center gap-3 px-3 py-2">
                                    <div class="size-6 shimmer rounded"></div>
                                    <div class="h-4 w-20 shimmer rounded"></div>
                                </div>
                                <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-surface-container">
                                    <div class="size-6 shimmer rounded"></div>
                                    <div class="h-4 w-20 shimmer rounded"></div>
                                </div>
                                <div class="flex items-center gap-3 px-3 py-2">
                                    <div class="size-6 shimmer rounded"></div>
                                    <div class="h-4 w-20 shimmer rounded"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Main Content Header -->
                    <div class="px-4 pb-3 pt-5 flex justify-between items-end">
                        <div class="h-8 w-48 shimmer rounded-lg"></div>
                    </div>
                    <!-- Skeleton Grid (6 cards) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-4">
                        <!-- Repeated Card Skeleton -->
                        <!-- Card 1 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-3/4 shimmer rounded"></div>
                                <div class="h-4 w-1/2 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Card 2 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-2/3 shimmer rounded"></div>
                                <div class="h-4 w-1/3 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Card 3 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-5/6 shimmer rounded"></div>
                                <div class="h-4 w-2/5 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Card 4 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-4/5 shimmer rounded"></div>
                                <div class="h-4 w-1/4 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Card 5 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-3/4 shimmer rounded"></div>
                                <div class="h-4 w-1/2 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Card 6 -->
                        <div class="flex flex-col gap-4 pb-6 border border-transparent rounded-xl">
                            <div class="w-full aspect-video shimmer rounded-xl"></div>
                            <div class="flex flex-col gap-3 px-1">
                                <div class="h-5 w-2/3 shimmer rounded"></div>
                                <div class="h-4 w-1/3 shimmer rounded opacity-70"></div>
                                <div class="flex gap-3 mt-1">
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                    <div class="h-8 w-20 shimmer rounded-lg"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
