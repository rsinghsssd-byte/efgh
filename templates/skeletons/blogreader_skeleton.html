<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Blog Reader Loading State</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#fffbff",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#8a4cfc",
                        "tertiary": "#00505f",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#006a7c",
                        "inverse-surface": "#2e3132",
                        "inverse-primary": "#c3c0ff",
                        "on-primary-fixed": "#0f0069",
                        "surface-dim": "#d9dadb",
                        "on-primary-container": "#dad7ff",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "outline": "#777587",
                        "on-surface-variant": "#464555",
                        "surface-container-low": "#f3f4f5",
                        "primary-container": "#4f46e5",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "primary": "#3525cd",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "error": "#ba1a1a",
                        "surface-tint": "#4d44e3",
                        "on-background": "#191c1d",
                        "surface": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#eaddff",
                        "primary-fixed": "#e2dfff",
                        "on-error-container": "#93000a",
                        "secondary": "#712ae2",
                        "tertiary-fixed": "#acedff",
                        "surface-container-high": "#e7e8e9",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary-fixed": "#001f26",
                        "surface-bright": "#f8f9fa",
                        "on-secondary-fixed": "#25005a",
                        "primary-fixed-dim": "#c3c0ff",
                        "background": "#f8f9fa",
                        "secondary-fixed-dim": "#d2bbff",
                        "inverse-on-surface": "#f0f1f2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "2.5rem",
                        "xl": "4rem",
                        "gutter": "24px",
                        "sm": "1rem",
                        "xs": "0.5rem",
                        "container-max": "1280px",
                        "md": "1.5rem",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .skeleton-shimmer {
            background: linear-gradient(90deg, #edeeef 25%, #f8f9fa 50%, #edeeef 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .skeleton-box {
            @apply rounded bg-surface-container-highest;
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md selection:bg-secondary-container selection:text-on-secondary-container">
    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 bg-surface-container-lowest/80 backdrop-blur-md border-b border-outline-variant">
        <div class="max-w-container-max mx-auto px-gutter h-16 flex items-center justify-between">
            <div class="flex items-center gap-md">
                <div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
                    <span class="material-icons text-on-primary-container">auto_stories</span>
                </div>
                <div class="hidden md:flex gap-sm">
                    <div class="w-16 h-4 skeleton-box skeleton-shimmer"></div>
                    <div class="w-16 h-4 skeleton-box skeleton-shimmer"></div>
                </div>
            </div>
            <div class="flex items-center gap-md">
                <div class="w-24 h-8 rounded-full skeleton-box skeleton-shimmer"></div>
                <div class="w-8 h-8 rounded-full skeleton-box skeleton-shimmer"></div>
            </div>
        </div>
    </nav>
    <main class="max-w-container-max mx-auto px-gutter py-xl">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-xl">
            <!-- Main Content Area -->
            <article class="lg:col-span-8">
                <!-- Breadcrumbs Skeleton -->
                <div class="flex items-center gap-xs mb-md">
                    <div class="w-12 h-3 skeleton-box skeleton-shimmer"></div>
                    <span class="material-icons text-sm text-outline">chevron_right</span>
                    <div class="w-20 h-3 skeleton-box skeleton-shimmer"></div>
                </div>
                <!-- Hero Section Skeleton -->
                <div
                    class="relative w-full aspect-[21/9] rounded-xl overflow-hidden mb-xl skeleton-shimmer bg-surface-container-highest">
                    <!-- This represents the large cover image from SCREEN_14 -->
                </div>
                <!-- Article Header -->
                <div class="mb-xl space-y-md">
                    <div class="w-3/4 h-12 skeleton-box skeleton-shimmer"></div>
                    <div class="w-1/2 h-8 skeleton-box skeleton-shimmer opacity-60"></div>
                    <div class="flex items-center gap-md pt-sm">
                        <div class="w-12 h-12 rounded-full skeleton-box skeleton-shimmer"></div>
                        <div class="space-y-2">
                            <div class="w-32 h-4 skeleton-box skeleton-shimmer"></div>
                            <div class="w-24 h-3 skeleton-box skeleton-shimmer opacity-50"></div>
                        </div>
                    </div>
                </div>
                <!-- Article Body Skeletons -->
                <div class="space-y-xl">
                    <!-- Paragraph 1 -->
                    <div class="space-y-4">
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-11/12 h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-4/5 h-4 skeleton-box skeleton-shimmer"></div>
                    </div>
                    <!-- Subheader -->
                    <div class="w-1/3 h-7 skeleton-box skeleton-shimmer mt-xl mb-md"></div>
                    <!-- Paragraph 2 with simulated image -->
                    <div class="space-y-4">
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-full h-64 rounded-lg skeleton-box skeleton-shimmer my-md"></div>
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-3/4 h-4 skeleton-box skeleton-shimmer"></div>
                    </div>
                    <!-- Paragraph 3 -->
                    <div class="space-y-4">
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-full h-4 skeleton-box skeleton-shimmer"></div>
                        <div class="w-11/12 h-4 skeleton-box skeleton-shimmer"></div>
                    </div>
                </div>
            </article>
            <!-- Sidebar / Table of Contents -->
            <aside class="hidden lg:block lg:col-span-4">
                <div class="sticky top-24 p-md rounded-xl border border-outline-variant bg-surface-container-low">
                    <div class="w-32 h-5 skeleton-box skeleton-shimmer mb-lg"></div>
                    <!-- TOC Items -->
                    <div class="space-y-md">
                        <div class="flex items-center gap-sm">
                            <div class="w-1 h-6 rounded-full bg-primary/20"></div>
                            <div class="w-48 h-4 skeleton-box skeleton-shimmer"></div>
                        </div>
                        <div class="flex items-center gap-sm pl-4">
                            <div class="w-40 h-4 skeleton-box skeleton-shimmer opacity-70"></div>
                        </div>
                        <div class="flex items-center gap-sm pl-4">
                            <div class="w-36 h-4 skeleton-box skeleton-shimmer opacity-70"></div>
                        </div>
                        <div class="flex items-center gap-sm">
                            <div class="w-1 h-6 rounded-full bg-surface-container-highest"></div>
                            <div class="w-52 h-4 skeleton-box skeleton-shimmer"></div>
                        </div>
                        <div class="flex items-center gap-sm">
                            <div class="w-1 h-6 rounded-full bg-surface-container-highest"></div>
                            <div class="w-44 h-4 skeleton-box skeleton-shimmer"></div>
                        </div>
                        <div class="flex items-center gap-sm pl-4">
                            <div class="w-32 h-4 skeleton-box skeleton-shimmer opacity-70"></div>
                        </div>
                    </div>
                    <!-- Newsletter Card Skeleton -->
                    <div class="mt-xl p-md rounded-lg bg-primary-container/10 border border-primary/10">
                        <div class="w-24 h-4 skeleton-box skeleton-shimmer mb-sm"></div>
                        <div class="w-full h-3 skeleton-box skeleton-shimmer mb-md opacity-60"></div>
                        <div class="w-full h-10 rounded-lg skeleton-box skeleton-shimmer"></div>
                    </div>
                </div>
            </aside>
        </div>
        <!-- Related Content Grid -->
        <section class="mt-xl pt-xl border-t border-outline-variant">
            <div class="w-48 h-8 skeleton-box skeleton-shimmer mb-lg"></div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-md">
                <!-- Card 1 -->
                <div class="space-y-sm">
                    <div class="aspect-video rounded-lg skeleton-box skeleton-shimmer"></div>
                    <div class="w-full h-5 skeleton-box skeleton-shimmer"></div>
                    <div class="w-2/3 h-4 skeleton-box skeleton-shimmer opacity-60"></div>
                </div>
                <!-- Card 2 -->
                <div class="space-y-sm">
                    <div class="aspect-video rounded-lg skeleton-box skeleton-shimmer"></div>
                    <div class="w-full h-5 skeleton-box skeleton-shimmer"></div>
                    <div class="w-2/3 h-4 skeleton-box skeleton-shimmer opacity-60"></div>
                </div>
                <!-- Card 3 -->
                <div class="space-y-sm">
                    <div class="aspect-video rounded-lg skeleton-box skeleton-shimmer"></div>
                    <div class="w-full h-5 skeleton-box skeleton-shimmer"></div>
                    <div class="w-2/3 h-4 skeleton-box skeleton-shimmer opacity-60"></div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-surface-container py-xl mt-xl border-t border-outline-variant">
        <div class="max-w-container-max mx-auto px-gutter grid grid-cols-2 md:grid-cols-4 gap-xl">
            <div class="col-span-2">
                <div class="w-32 h-8 skeleton-box skeleton-shimmer mb-md"></div>
                <div class="w-64 h-4 skeleton-box skeleton-shimmer opacity-60"></div>
            </div>
            <div class="space-y-sm">
                <div class="w-24 h-4 skeleton-box skeleton-shimmer mb-sm"></div>
                <div class="w-20 h-3 skeleton-box skeleton-shimmer opacity-60"></div>
                <div class="w-20 h-3 skeleton-box skeleton-shimmer opacity-60"></div>
                <div class="w-20 h-3 skeleton-box skeleton-shimmer opacity-60"></div>
            </div>
            <div class="space-y-sm">
                <div class="w-24 h-4 skeleton-box skeleton-shimmer mb-sm"></div>
                <div class="w-20 h-3 skeleton-box skeleton-shimmer opacity-60"></div>
                <div class="w-20 h-3 skeleton-box skeleton-shimmer opacity-60"></div>
            </div>
        </div>
    </footer>
    <script>
        // Simple intersection observer to show/hide the TOC highlight or simulation logic
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Skeleton loader initialized');
        });
    </script>
</body>

</html>
