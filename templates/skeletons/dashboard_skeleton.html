<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Luminous AI - Dashboard Loading</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link

                        "on-primary-fixed": "#0f0069",

                        "tertiary-fixed-dim": "#4cd7f6",

                        "on-secondary-fixed": "#25005a",
                        "outline": "#777587",
                        "on-secondary-container": "#fffbff",
                        "on-tertiary-fixed": "#001f26",
                        "on-primary-fixed-variant": "#3323cc",
                        "secondary": "#712ae2",
                        "on-tertiary-container": "#93e8ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",

                    "borderRadius": {

                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "xl": "4rem",
                        "lg": "2.5rem",
                        "xs": "0.5rem",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "base": "4px",
                        "sm": "1rem",
                        "md": "1.5rem"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],

                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "display": ["Inter"]

                }
            }
        }

    <style>
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, #edeeef 25%, #f8f9fa 50%, #edeeef 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #f8f9fa;
            color: #191c1d;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background min-h-screen overflow-x-hidden">
    <!-- TopNavBar Shell -->
    <header
        class="fixed top-0 w-full z-50 flex justify-between items-center px-lg py-md max-w-container-max mx-auto bg-surface-container-lowest shadow-sm">
        <div class="flex items-center gap-md">
            <span class="font-display text-headline-md font-bold text-primary">Luminous AI</span>
            <nav class="hidden md:flex gap-md ml-lg">
                <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Pricing</a>
                <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Community</a>
                <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Docs</a>
            </nav>
        </div>
        <div class="flex items-center gap-md">
            <div class="hidden md:flex bg-surface-container rounded-full px-md py-xs items-center gap-sm">
                <span class="material-symbols-outlined text-on-surface-variant">search</span>
                <input class="bg-transparent border-none focus:ring-0 text-label-md w-48" placeholder="Search..."
                    type="text" />
            </div>
            <button
                class="bg-primary text-on-primary px-md py-xs rounded-full font-label-md hover:opacity-90 transition-opacity">Create
                New</button>
            <span class="material-symbols-outlined text-on-surface-variant cursor-pointer">notifications</span>
            <span class="material-symbols-outlined text-on-surface-variant cursor-pointer">settings</span>
            <div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
                <img class="w-full h-full object-cover"
                    data-alt="A professional headshot of a young creative director, clean studio lighting, high-end editorial photography, soft bokeh background, minimalist aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuApaTFebvq9vV2HGY2NJT81i6LpfRlpDJCw0w9lwqQKVHMwFpbXLYcIyg8pyMstOp9V01Zf4S1PDCpC-qV6jfa5Rk_gp55N7xPFm5r9evSm5K36mKj1INpBgZRScWrUIC1rpbmjSqiOk-6e6ovfrafCtXsqs4I8dHKzplJ-N8O3LV0MOvWfHigMAjaZbZmISm3q-ZKA1uuTnuN9uWm1O0ZQfF0mF9vGmojRJMDFDX9of-a_BvjA8TaufQ" />
            </div>
        </div>
    </header>
    <!-- SideNavBar Shell -->
    <aside
        class="fixed left-0 top-0 h-full flex flex-col p-md z-40 border-r border-outline-variant bg-surface-container-low w-64 pt-24">
        <div class="flex flex-col gap-xs flex-grow">
            <!-- Active Tab: Dashboard -->
            <a class="flex items-center gap-md bg-primary-container text-on-primary-container rounded-xl p-md transition-all scale-102"
                href="#">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-label-md text-label-md">Dashboard</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant p-md hover:bg-surface-variant rounded-xl transition-all"
                href="#">
                <span class="material-symbols-outlined">auto_awesome</span>
                <span class="font-label-md text-label-md">Generator</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant p-md hover:bg-surface-variant rounded-xl transition-all"
                href="#">
                <span class="material-symbols-outlined">article</span>
                <span class="font-label-md text-label-md">My Blogs</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant p-md hover:bg-surface-variant rounded-xl transition-all"
                href="#">
                <span class="material-symbols-outlined">analytics</span>
                <span class="font-label-md text-label-md">Analytics</span>
            </a>
        </div>
        <div class="mt-auto pt-md border-t border-outline-variant flex flex-col gap-xs">
            <div class="p-md mb-sm bg-secondary-container rounded-xl text-on-secondary-container">
                <p class="font-label-sm text-label-sm mb-xs">Pro Plan Active</p>
                <button class="w-full py-xs bg-surface-container-lowest text-primary font-label-md rounded-lg">Upgrade
                    Pro</button>
            </div>
            <a class="flex items-center gap-md text-on-surface-variant p-md hover:bg-surface-variant rounded-xl transition-all"
                href="#">
                <span class="material-symbols-outlined">help</span>
                <span class="font-label-md text-label-md">Help</span>
            </a>
            <a class="flex items-center gap-md text-on-surface-variant p-md hover:bg-surface-variant rounded-xl transition-all"
                href="#">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-label-md text-label-md">Logout</span>
            </a>
        </div>
    </aside>
    <!-- Main Canvas Area -->
    <main class="ml-64 pt-24 px-lg pb-lg">
        <div class="max-w-6xl mx-auto">
            <!-- Welcome Header Skeleton -->
            <div class="mb-lg">
                <div class="h-8 w-64 shimmer rounded-lg mb-xs"></div>
                <div class="h-4 w-96 shimmer rounded-lg opacity-60"></div>
            </div>
            <!-- Summary Cards Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-md mb-lg">
                <!-- Total Blogs Skeleton -->
                <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-outline-variant/30">
                    <div class="flex justify-between items-start mb-md">
                        <div class="h-10 w-10 shimmer rounded-lg"></div>
                        <div class="h-4 w-12 shimmer rounded-full"></div>
                    </div>
                    <div class="h-4 w-24 shimmer rounded-lg mb-sm"></div>
                    <div class="h-8 w-16 shimmer rounded-lg"></div>
                </div>
                <!-- Words Generated Skeleton -->
                <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-outline-variant/30">
                    <div class="flex justify-between items-start mb-md">
                        <div class="h-10 w-10 shimmer rounded-lg"></div>
                        <div class="h-4 w-12 shimmer rounded-full"></div>
                    </div>
                    <div class="h-4 w-32 shimmer rounded-lg mb-sm"></div>
                    <div class="h-8 w-32 shimmer rounded-lg"></div>
                </div>
                <!-- Active Credits Skeleton -->
                <div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-outline-variant/30">
                    <div class="flex justify-between items-start mb-md">

                        <div class="h-4 w-12 shimmer rounded-full"></div>
                    </div>
                    <div class="h-4 w-28 shimmer rounded-lg mb-sm"></div>
                    <div class="h-8 w-24 shimmer rounded-lg"></div>
                </div>
            </div>
            <!-- Bento Layout Content Area -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-md">
                <!-- Recent Activity List (Span 2) -->
                <div
                    class="lg:col-span-2 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 p-lg">
                    <div class="flex justify-between items-center mb-lg">
                        <div class="h-6 w-40 shimmer rounded-lg"></div>
                        <div class="h-4 w-20 shimmer rounded-lg"></div>
                    </div>
                    <div class="space-y-md">
                        <!-- Activity Item 1 -->
                        <div class="flex items-center gap-md pb-md border-b border-outline-variant/20">
                            <div class="w-12 h-12 shimmer rounded-lg shrink-0"></div>
                            <div class="flex-grow">
                                <div class="h-4 w-1/2 shimmer rounded-lg mb-xs"></div>
                                <div class="h-3 w-1/4 shimmer rounded-lg opacity-60"></div>
                            </div>
                            <div class="h-8 w-24 shimmer rounded-full"></div>
                        </div>
                        <!-- Activity Item 2 -->
                        <div class="flex items-center gap-md pb-md border-b border-outline-variant/20">
                            <div class="w-12 h-12 shimmer rounded-lg shrink-0"></div>
                            <div class="flex-grow">
                                <div class="h-4 w-3/4 shimmer rounded-lg mb-xs"></div>
                                <div class="h-3 w-1/3 shimmer rounded-lg opacity-60"></div>
                            </div>
                            <div class="h-8 w-24 shimmer rounded-full"></div>
                        </div>
                        <!-- Activity Item 3 -->
                        <div class="flex items-center gap-md pb-md border-b border-outline-variant/20">
                            <div class="w-12 h-12 shimmer rounded-lg shrink-0"></div>
                            <div class="flex-grow">
                                <div class="h-4 w-2/3 shimmer rounded-lg mb-xs"></div>
                                <div class="h-3 w-1/4 shimmer rounded-lg opacity-60"></div>
                            </div>
                            <div class="h-8 w-24 shimmer rounded-full"></div>
                        </div>
                        <!-- Activity Item 4 -->
                        <div class="flex items-center gap-md">
                            <div class="w-12 h-12 shimmer rounded-lg shrink-0"></div>
                            <div class="flex-grow">
                                <div class="h-4 w-1/2 shimmer rounded-lg mb-xs"></div>
                                <div class="h-3 w-1/5 shimmer rounded-lg opacity-60"></div>
                            </div>
                            <div class="h-8 w-24 shimmer rounded-full"></div>
                        </div>
                    </div>
                </div>
                <!-- Secondary Insight Panel (Span 1) -->
                <div class="flex flex-col gap-md">
                    <!-- Analytics Quick View Skeleton -->
                    <div
                        class="bg-surface-container-lowest p-lg rounded-xl shadow-sm border border-outline-variant/30 flex-grow">
                        <div class="h-6 w-32 shimmer rounded-lg mb-lg"></div>
                        <div class="flex items-end justify-between gap-xs h-32 mb-md">
                            <div class="w-full shimmer rounded-t-lg" style="height: 40%"></div>
                            <div class="w-full shimmer rounded-t-lg" style="height: 70%"></div>
                            <div class="w-full shimmer rounded-t-lg" style="height: 50%"></div>
                            <div class="w-full shimmer rounded-t-lg" style="height: 90%"></div>
                            <div class="w-full shimmer rounded-t-lg" style="height: 60%"></div>
                        </div>
                        <div class="h-4 w-full shimmer rounded-lg mb-xs"></div>
                        <div class="h-4 w-2/3 shimmer rounded-lg"></div>
                    </div>
                    <!-- Usage Limits Skeleton -->
                    <div class="bg-primary p-lg rounded-xl shadow-sm text-on-primary">
                        <div class="h-5 w-40 bg-on-primary/20 animate-pulse rounded-lg mb-md"></div>
                        <div class="w-full h-2 bg-on-primary/20 rounded-full mb-md overflow-hidden">
                            <div class="h-full bg-on-primary w-2/3"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="h-4 w-20 bg-on-primary/20 animate-pulse rounded-lg"></div>
                            <div class="h-4 w-12 bg-on-primary/20 animate-pulse rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Footer Meta Area -->
            <div class="mt-xl flex justify-between items-center opacity-40">
                <div class="h-4 w-32 shimmer rounded-lg"></div>
                <div class="flex gap-md">
                    <div class="h-4 w-16 shimmer rounded-lg"></div>
                    <div class="h-4 w-16 shimmer rounded-lg"></div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Micro-interaction for sidebar tabs (even in loading state)
        document.querySelectorAll('aside a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                // Simple visual feedback for demo
                link.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    link.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body>

</html>
